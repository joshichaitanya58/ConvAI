<!DOCTYPE html>
<html>

<body
    style="margin:0;padding:0;background-color:#0e1116;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
        style="background-color:#0e1116;padding:40px 20px;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0"
                    style="max-width:600px;width:100%;">
                    <tr>
                        <td align="center" style="padding-bottom:32px;">
                            <table role="presentation" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td
                                        style="width:36px;height:36px;border-radius:9px;background:linear-gradient(150deg,#f0bd76,#e0a458 70%);text-align:center;vertical-align:middle;font-family:'Georgia',serif;font-weight:bold;font-size:18px;color:#0e1116;">

                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td

                                <tr>
                                    <td style="height:4px;background:linear-gradient(90deg,#e0a458,#f0bd76,#e0a458);">
                                    </td>
                                </tr>
                            </table>
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                                style="padding:36px 32px;">
                                <tr>
                                    <td
                                        style="font-family:'Georgia',serif;font-size:22px;font-weight:bold;color:#f3efe6;text-align:center;padding-bottom:8px;">
                                        {{ subject }}</td>
                                </tr>
                                <tr>
                                    <td
                                        style="font-size:15px;color:#cfc9bc;text-align:center;padding-bottom:28px;line-height:1.6;">

                                </tr>
                                <tr>
                                    <td align="center" style="padding-bottom:24px;">

                                            <span
                                                style="font-family:'Courier New',monospace;font-size:32px;font-weight:bold;letter-spacing:8px;color:#e0a458;">{{
                                                otp }}</span>

                                    </td>
                                </tr>
                                <tr>
                                    <td
                                        style="font-size:13px;color:#6b7585;text-align:center;padding-bottom:20px;line-height:1.6;">

                                        you did not request this, you can safely ignore this email.</td>
                                </tr>
                            </table>
                        </td>

                        <td style="padding-top:28px;text-align:center;">
                            <p style="font-size:12px;color:#6b7585;margin:0;line-height:1.5;">This is an automated
                                message from ConvAI. Please do not reply.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
